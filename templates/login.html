<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <title>Вход - ИАРА</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/base.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/index.css') }}">
</head>
<body>
    <div class="auth-container">
        <h2>Вход в системата</h2>
        {% with messages = get_flashed_messages() %}
          {% if messages %}
            {% for message in messages %}
              <div class="flash" style="background:#f8d7da; color:#721c24; border:1px solid #f5c6cb;">{{ message }}</div>
            {% endfor %}
          {% endif %}
        {% endwith %}
        <form action="{{ url_for('login') }}" method="POST" class="auth-form">
            <input type="text" name="username" placeholder="Потребителско име" required>
            <input type="password" name="password" placeholder="Парола" required>
            <button type="submit">Влез</button>
        </form>
        <div class="auth-footer">
            <a href="{{ url_for('signup') }}">Нямате профил? Регистрирайте се</a><br>
            <a href="{{ url_for('index') }}">← Обратно</a>
        </div>
    </div>
</body>
</html>
