<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <title>Риболовен Портал - Потребител</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: #f0f4f8; }
        .nav { background: #004080; color: white; padding: 15px 40px; display: flex; justify-content: space-between; }
        .container { max-width: 1100px; margin: auto; padding: 20px; }
        .card { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 20px; }
        #map { height: 400px; border-radius: 10px; cursor: crosshair; }
        .btn { background: #004080; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; width: 100%; margin-top: 10px; }
        input, select { width: 100%; padding: 10px; margin: 5px 0; border: 1px solid #ccc; border-radius: 5px; }
    </style>
</head>
<body>
    <div class="nav">
        <h2>🐟 Моят Риболовен Профил</h2>
        <a href="{{ url_for('logout') }}" style="color:white;">Изход</a>
    </div>

    <div class="container">
        <div class="card">
            <h3>📅 Резервирай час за билет</h3>
            <form action="{{ url_for('book_appointment') }}" method="POST">
                <input type="text" name="full_name" placeholder="Вашите имена" required>
                <select name="ticket_type">
                    <option value="Annual">Годишен - 25.00 €</option>
                    <option value="Monthly">Месечен - 10.00 €</option>
                    <option value="Weekly">Седмичен - 5.00 €</option>
                </select>
                <input type="date" name="date" required>
                <input type="time" name="time" required>
                <button type="submit" class="btn">Запази час в календара</button>
            </form>
        </div>

        <div class="card">
            <h3>🗺️ Кликни върху картата, за да подадеш улов</h3>
            <p id="loc_info" style="color: #004080; font-weight: bold;">Избери място от картата...</p>
            <div id="map"></div>

            <form action="{{ url_for('submit_log') }}" method="POST" id="log_form" style="margin-top:15px;">
                <input type="hidden" name="lat" id="lat">
                <input type="hidden" name="lng" id="lng">
                <input type="hidden" name="water_body" id="water_body">
                <input type="hidden" name="location_name" id="location_name">

                <input type="text" name="fish_type" placeholder="Вид риба" required>
                <input type="number" step="0.1" name="qty" placeholder="Количество (кг)" required>
                <button type="submit" class="btn" style="background: #28a745;">Изпрати улов за валидация</button>
            </form>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        var map = L.map('map').setView([42.50, 27.46], 10);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

        map.on('click', function(e) {
            var lat = e.latlng.lat;
            var lng = e.latlng.lng;

            fetch(`https://nominatim.openstreetmap.org/reverse?format=jsonv2&lat=${lat}&lon=${lng}`)
            .then(res => res.json())
            .then(data => {
                let type = data.type || "Водоем";
                let name = data.display_name;

                document.getElementById('lat').value = lat;
                document.getElementById('lng').value = lng;
                document.getElementById('water_body').value = type;
                document.getElementById('location_name').value = name;
                document.getElementById('loc_info').innerText = "Избрано: " + type + " (" + name.split(',')[0] + ")";

                // Отваряне на маршрут от Бургас (Точка А) до избраното място
                if(confirm("Искате ли маршрут до това място?")) {
                    window.open(`https://www.google.com/maps/dir/Burgas/${lat},${lng}`, '_blank');
                }
            });
        });
    </script>
</body>
</html>
