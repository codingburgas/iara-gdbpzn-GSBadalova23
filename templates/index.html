<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <title>ИАРА - Интелигентна Система</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            background: linear-gradient(135deg, #f0f2f5 0%, #c9d6ff 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }
        .hero {
            text-align: center;
            background: white;
            padding: 60px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.15);
            border-top: 10px solid #003366;
            max-width: 550px;
            transition: transform 0.3s;
        }
        .hero:hover { transform: scale(1.02); }
        h1 { color: #003366; margin-bottom: 10px; font-size: 3em; letter-spacing: 2px; }
        .tagline { color: #004080; font-weight: bold; margin-bottom: 20px; font-size: 1.1em; }
        p { color: #666; margin-bottom: 35px; line-height: 1.6; font-size: 1.05em; }
        .btn-container { display: flex; justify-content: center; gap: 15px; }
        .btn {
            display: inline-block;
            padding: 15px 35px;
            text-decoration: none;
            border-radius: 10px;
            font-weight: bold;
            transition: 0.3s;
            font-size: 16px;
        }
        .btn-login { background: #003366; color: white; box-shadow: 0 4px 10px rgba(0,51,102,0.3); }
        .btn-signup { border: 2px solid #003366; color: #003366; }
        .btn:hover { opacity: 0.9; transform: translateY(-3px); box-shadow: 0 6px 15px rgba(0,0,0,0.2); }
        .footer-text { margin-top: 30px; font-size: 0.8em; color: #999; }
    </style>
</head>
<body>
    <div class="hero">
        <h1>ИАРА ⚓</h1>
        <div class="tagline">Smart Fishery Management v2.0</div>
        <p>Добре дошли в дигиталната платформа на Изпълнителна агенция по рибарство и аквакултури. Управлявайте вашите билети, часове и улов в реално време.</p>

        <div class="btn-container">
            <a href="{{ url_for('login') }}" class="btn btn-login">Вход в системата</a>
            <a href="{{ url_for('signup') }}" class="btn btn-signup">Регистрация</a>
        </div>

        <div class="footer-text">© 2026 ИАРА България - Всички права запазени</div>
    </div>
</body>
</html>
