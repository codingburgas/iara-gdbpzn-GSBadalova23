<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <title>Регистрация - ИАРА</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }

        .card { background: white; padding: 40px; border-radius: 12px; box-shadow: 0 8px 20px rgba(0,0,0,0.1); width: 360px; border-top: 6px solid #004080; }
        h2 { color: #004080; text-align: center; margin-bottom: 10px; }
        .subtitle { text-align: center; color: #666; font-size: 0.85em; margin-bottom: 25px; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }

        button { width: 100%; padding: 12px; background: #004080; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        button:hover { background: #002d59; }
        .flash { padding: 10px; margin-bottom: 20px; border-radius: 5px; text-align: center; font-size: 0.9em; }
        .danger { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        .success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
    </style>
</head>
<body>
    <div class="card">
        <h2>Регистрация</h2>
        <p class="subtitle">Създайте профил в системата на ИАРА</p>

        {% with messages = get_flashed_messages(with_categories=true) %}
          {% if messages %}
            {% for category, message in messages %}
              <div class="flash {{ category }}">{{ message }}</div>
            {% endfor %}
          {% endif %}
        {% endwith %}

        <form action="{{ url_for('signup') }}" method="POST">
            <input type="text" name="username" placeholder="Потребителско име" required>
            <input type="password" name="password" placeholder="Парола" required>
            <button type="submit">Създай профил</button>
        </form>

        <a href="{{ url_for('login') }}" style="display:block; text-align:center; margin-top:20px; color:#666; text-decoration:none;">Вече имате профил? Влезте тук.</a>
    </div>
</body>
</html>
