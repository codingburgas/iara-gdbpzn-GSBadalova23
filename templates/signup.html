<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <title>Регистрация - ИАРА</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/base.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/index.css') }}">
</head>
<body>
    <div class="auth-container">
        <h2>Регистрация</h2>
        <p style="text-align:center; color:#666;">Създайте профил в системата</p>
        <form action="{{ url_for('signup') }}" method="POST" class="auth-form">
            <input type="text" name="username" placeholder="Потребителско име" required>
            <input type="password" name="password" placeholder="Парола" required>
            <button type="submit">Създай профил</button>
        </form>
        <div class="auth-footer">
            <a href="{{ url_for('login') }}">Вече имате профил? Влезте тук.</a>
        </div>
    </div>
</body>
</html>
